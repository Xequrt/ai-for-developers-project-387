name: Auto Triage PR

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
      contents: read
      statuses: write
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR diff stats
        id: diff
        run: |
          git diff --stat origin/${{ github.base_ref }}...HEAD > diff_stat.txt
          {
            echo "diff_stat<<EOF"
            cat diff_stat.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          lines_changed=$(git diff --numstat origin/${{ github.base_ref }}...HEAD | awk '{sum+=$1+$2} END {print sum}')
          echo "lines_changed=$lines_changed" >> "$GITHUB_OUTPUT"

      - name: Run OpenCode Auto-Triage PR
        uses: ./.github/actions/auto-triage-pr
        with:
          pr_number: ${{ github.event.pull_request.number }}
          title: ${{ github.event.pull_request.title }}
          author: ${{ github.event.pull_request.user.login }}
          body: ${{ github.event.pull_request.body }}
          changed_files: ${{ github.event.pull_request.changed_files }}
          lines_changed: ${{ steps.diff.outputs.lines_changed }}
          diff_stat: ${{ steps.diff.outputs.diff_stat }}
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}


      - name: Set merge status check
        if: always()
        run: |
          if [ "${{ job.status }}" == "failure" ]; then
            state="failure"
            description="Auto-triage failed — fix issues before merge"
          else
            state="success"
            description="Auto-triage passed"
          fi
          
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state="$state" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="$description" \
            -f context="auto-triage/pr"
        env:
          GH_TOKEN: ${{ github.token }}

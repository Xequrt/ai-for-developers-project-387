name: Auto Triage PR

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR diff stats
        id: diff
        run: |
          git diff --stat origin/${{ github.base_ref }}...HEAD > diff_stat.txt
          echo "diff_stat=$(cat diff_stat.txt)" >> $GITHUB_OUTPUT
          lines_changed=$(git diff --numstat origin/${{ github.base_ref }}...HEAD | awk '{sum+=$1+$2} END {print sum}')
          echo "lines_changed=$lines_changed" >> $GITHUB_OUTPUT

      - name: Run OpenCode Auto-Triage PR
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/minimax-m2.5-free
          prompt: |
            Запусти скилл auto-triage для обработки Pull Request.
            
            PR #${{ github.event.pull_request.number }}
            Title: ${{ github.event.pull_request.title }}
            Author: @${{ github.event.pull_request.user.login }}
            Body: ${{ github.event.pull_request.body }}
            Changed files: ${{ github.event.pull_request.changed_files }}
            Lines changed: ${{ steps.diff.outputs.lines_changed }}
            Diff stats: ${{ steps.diff.outputs.diff_stat }}
            
            Твоя задача:
            1. Определи области по changed files: frontend, backend, api, ci-cd, tests, infrastructure
            2. Оцени размер: XS(1-10), S(11-50), M(51-200), L(201-500), XL(500+)
            3. Проверь полноту описания (наличие ссылки на issue, описание изменений)
            4. Проверь наличие тестов (есть ли изменения в test/ или __tests__/)
            5. Напиши начальный review комментарий с summary
            6. Примени labels: области + размер
            7. Установи status check (success/failure) — failure блокирует merge если PR пустой, без описания, или XL без review approval
            
            Используй gh CLI для labels, комментариев и статусов.

      - name: Set merge status check
        if: always()
        run: |
          if [ "${{ job.status }}" == "failure" ]; then
            state="failure"
            description="Auto-triage failed — fix issues before merge"
          else
            state="success"
            description="Auto-triage passed"
          fi
          
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state="$state" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="$description" \
            -f context="auto-triage/pr"
        env:
          GH_TOKEN: ${{ github.token }}
